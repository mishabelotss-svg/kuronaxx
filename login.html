<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Kuronaxx</title>
    <style>
        :root {
            --primary: #66c0f4;
            --secondary: #4b7bac;
            --dark: #1b2838;
            --light: #c7d5e0;
            --accent: #2a475e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--dark), #0f1a24);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-img {
            height: 45px;
            width: auto;
            display: block;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            color: var(--light);
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .register-link {
            background: var(--primary);
            padding: 8px 20px;
            border-radius: 20px;
            color: var(--dark) !important;
            font-weight: 600;
        }

        .register-link:hover {
            background: var(--secondary);
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .auth-card h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--light);
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 2px var(--primary);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: var(--dark);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .message.error {
            background: rgba(255, 68, 68, 0.2);
            color: #ff6666;
        }

        .message.success {
            background: rgba(68, 255, 68, 0.2);
            color: #66ff66;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.5);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 768px) {
            .auth-card {
                padding: 30px 20px;
            }
            .logo-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo-container">
            <img src="images/logo.png" alt="Kuronaxx" class="logo-img">
            <span class="logo-text">Kurona</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="register.html">Регистрация</a>
        </div>
    </header>

    <div class="container">
        <div class="auth-card">
            <h1>Вход в аккаунт</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="example@mail.com">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" required placeholder="Введите пароль">
                </div>
                <button type="submit" class="btn-submit">Войти</button>
            </form>
            <div id="message" class="message"></div>
            <div class="auth-footer">
                Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
            </div>
        </div>
    </div>

    <footer>
        <p>Сделано: Белоцерковец Михаил</p>
    </footer>

    <script src="scripts/auth.js"></script>
    <script>
        // Проверяем, если пользователь уже вошёл, перенаправляем на главную
        if (isLoggedIn()) {
            window.location.href = 'index.html';
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            if (!email || !password) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Пожалуйста, заполните все поля';
                return;
            }
            
            const result = loginUser(email, password);
            
            if (result.success) {
                messageDiv.className = 'message success';
                messageDiv.textContent = result.message;
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                messageDiv.className = 'message error';
                messageDiv.textContent = result.message;
            }
        });
    </script>
</body>
</html>
