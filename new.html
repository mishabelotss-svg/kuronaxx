<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новинки - Kuronaxx</title>
    <style>
        :root {
            --primary: #66c0f4;
            --secondary: #4b7bac;
            --dark: #1b2838;
            --light: #c7d5e0;
            --accent: #2a475e;
            --rating: #ffc107;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Более тёмный фон с лёгким градиентом */
            background: linear-gradient(135deg, #0a0f16 0%, #03060c 100%);
            color: var(--light);
            min-height: 100vh;
            padding-bottom: 50px;
            position: relative;
        }

        /* Эффект свечения по краям */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(102, 192, 244, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Остальные стили остаются без изменений */
        header {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-img {
            height: 45px;
            width: auto;
            display: block;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .login-link {
            background: var(--primary);
            padding: 8px 20px;
            border-radius: 20px;
            color: var(--dark);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .login-link:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .user-name {
            color: var(--light);
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .search {
            flex: 1;
            min-width: 250px;
            max-width: 500px;
        }

        .search input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .search input:focus {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 3px rgba(102, 192, 244, 0.3);
        }

        .category-bar {
            background: #171a21;
            border-bottom: 1px solid #2d2f33;
            padding: 10px 0;
            width: 100%;
            position: relative;
            z-index: 1000;
        }

        .category-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        .category-item {
            color: #b8b6b4;
            text-decoration: none;
            font-size: 14px;
            padding: 5px 0;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }

        .category-item:hover {
            color: white;
            border-bottom-color: var(--primary);
        }

        .category-item.active {
            color: white;
            border-bottom-color: var(--primary);
            font-weight: 600;
        }

        .dropdown {
            position: relative;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #2a2d33;
            min-width: 250px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 1500;
            border-radius: 4px;
            margin-top: 8px;
            padding: 10px 0;
        }

        @media (min-width: 769px) {
            .dropdown:hover .dropdown-menu {
                display: block;
            }
        }

        @media (max-width: 768px) {
            .dropdown-menu {
                display: none;
                position: static;
                box-shadow: none;
                background: transparent;
                padding-left: 20px;
            }
            .dropdown-menu.show {
                display: block;
            }
        }

        .submenu-content {
            padding: 10px 15px;
            color: white;
        }

        .submenu-content a[href] {
            color: white;
            font-weight: 600;
            text-decoration: none;
            display: block;
            transition: color 0.2s;
        }

        .submenu-content a[href]:hover {
            color: var(--primary);
        }

        .container {
            padding: 30px 5%;
            position: relative;
            z-index: 1;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2rem;
            text-align: center;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            color: inherit;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .game-image {
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .game-image::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
        }

        .game-content {
            padding: 20px;
        }

        .game-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: white;
        }

        .game-description {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .game-rating {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .stars {
            color: var(--rating);
            margin-right: 10px;
        }

        .rating-value {
            font-weight: bold;
        }

        .wishlist-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding: 8px 0;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
        }

        .wishlist-btn:hover {
            opacity: 0.8;
        }

        .wishlist-btn span:first-child {
            font-size: 1.5rem;
            transition: color 0.2s;
        }

        .wishlist-btn span:last-child {
            color: var(--light);
            font-size: 0.95rem;
        }

        .new-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4444;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 2;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .authors-footer {
            text-align: center;
            padding: 25px;
            margin-top: 50px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            position: relative;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .authors-footer::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--primary), transparent);
        }

        .footer-label {
            color: rgba(255, 255, 255, 0.8);
        }

        .developer-block {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            padding: 5px 15px;
            border-radius: 40px;
            margin: 5px;
        }

        .author-name {
            background: linear-gradient(to right, var(--accent), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 600;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            transition: transform 0.2s;
            text-decoration: none;
        }

        .social-link:hover {
            transform: translateY(-2px);
        }

        .social-icon {
            width: 24px;
            height: 24px;
            vertical-align: middle;
        }

        @media (max-width: 768px) {
            .games-grid {
                grid-template-columns: 1fr;
            }
            
            header {
                flex-direction: column;
                text-align: center;
            }
            
            .search {
                width: 100%;
            }

            .category-container {
                justify-content: center;
            }

            .dropdown-menu {
                position: static;
                box-shadow: none;
                background: transparent;
                padding-left: 20px;
            }

            .dropdown:hover .dropdown-menu {
                display: none;
            }

            .dropdown.active .dropdown-menu {
                display: block;
            }

            .authors-footer {
                flex-direction: column;
                gap: 12px;
            }
            .developer-block {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo-container">
            <img src="images/logo.png" alt="Kuronaxx" class="logo-img">
            <span class="logo-text">Kurona</span>
        </a>
        <div class="search">
            <input type="text" id="searchInput" placeholder="Поиск новинок...">
        </div>
        <div class="header-right">
            <div id="userInfo" style="display: none;">
                <span id="userName" class="user-name"></span>
                <button id="logoutBtn" class="logout-btn">Выйти</button>
            </div>
            <a href="login.html" id="loginLink" class="login-link">Войти</a>
        </div>
    </header>

    <div class="category-bar">
        <div class="category-container">
            <div class="dropdown">
                <a href="index.html" class="category-item" id="mainDropdownToggle">Главная</a>
                <div class="dropdown-menu" id="mainDropdownMenu">
                    <div class="submenu-content">
                        <a href="new.html">Новинки →</a>
                    </div>
                    <div class="submenu-content">
                        <a href="wishlist.html">Список желаемого →</a>
                    </div>
                </div>
            </div>
            <a href="info.html" class="category-item">Информация</a>
            <a href="support.html" class="category-item">Поддержка</a>
        </div>
    </div>

    <div class="container">
        <h1>Новинки игр</h1>
        <div class="games-grid" id="gamesContainer"></div>
    </div>

    <footer class="authors-footer">
        <span class="footer-label">Разработчики :</span>
        <div class="developer-block">
            <span class="author-name">Белоцерковец Михаил</span>
            <a href="https://t.me/oblakk7" target="_blank" class="social-link" rel="noopener noreferrer">
                <img src="images/telegram-icon.png" alt="Telegram" class="social-icon">
            </a>
            <a href="https://www.tiktok.com/@push_ok7?_r=1&_t=ZS-94zVxjJcI4q" target="_blank" class="social-link" rel="noopener noreferrer">
                <img src="images/tiktok-icon.png" alt="TikTok" class="social-icon">
            </a>
        </div>
        <div class="developer-block">
            <span class="author-name">Салим Абду Рафаэль</span>
            <a href="#" class="social-link" target="_blank" rel="noopener noreferrer">
                <img src="images/telegram-icon.png" alt="Telegram" class="social-icon">
            </a>
            <a href="#" class="social-link" target="_blank" rel="noopener noreferrer">
                <img src="images/tiktok-icon.png" alt="TikTok" class="social-icon">
            </a>
        </div>
    </footer>

    <script src="scripts/auth.js"></script>
    <script src="scripts/games.js"></script>
    <script>
        function displayGames(gamesToShow) {
            const container = document.getElementById('gamesContainer');
            container.innerHTML = '';

            const wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');

            gamesToShow.forEach(game => {
                const isInWishlist = wishlist.some(item => item.id === game.id);
                const heartColor = isInWishlist ? 'red' : '#b8b6b4';

                const card = document.createElement('a');
                card.className = 'game-card';
                card.href = `game.html?id=${game.id}`;
                
                let badgeHtml = '';
                if (game.isNew) {
                    badgeHtml = '<div class="new-badge">NEW</div>';
                }
                
                card.innerHTML = `
                    ${badgeHtml}
                    <div class="game-image" style="background-image: url('${game.image}')"></div>
                    <div class="game-content">
                        <h3 class="game-title">${game.title}</h3>
                        <p class="game-description">${game.description}</p>
                        <div class="game-rating">
                            <div class="stars">${'★'.repeat(Math.floor(game.rating))}${'☆'.repeat(5-Math.floor(game.rating))}</div>
                            <div class="rating-value">${game.rating}/5</div>
                        </div>
                        <div class="wishlist-btn" data-id="${game.id}" data-title="${game.title}" data-image="${game.image}" data-description="${game.description}" data-rating="${game.rating}">
                            <span style="color: ${heartColor};">❤</span>
                            <span>В желаемое</span>
                        </div>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        function filterGames() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filteredGames = games.filter(game => 
                game.isNew && game.title.toLowerCase().includes(searchTerm)
            );
            displayGames(filteredGames);
        }

        document.addEventListener('click', function(e) {
            const wishlistBtn = e.target.closest('.wishlist-btn');
            if (!wishlistBtn) return;
            
            e.preventDefault();
            e.stopPropagation();

            const id = wishlistBtn.dataset.id;
            const title = wishlistBtn.dataset.title;
            const image = wishlistBtn.dataset.image;
            const description = wishlistBtn.dataset.description;
            const rating = parseFloat(wishlistBtn.dataset.rating);

            let wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
            const index = wishlist.findIndex(item => item.id === id);

            const heartSpan = wishlistBtn.querySelector('span:first-child');

            if (index === -1) {
                wishlist.push({ id, title, image, description, rating });
                heartSpan.style.color = 'red';
            } else {
                wishlist.splice(index, 1);
                heartSpan.style.color = '#b8b6b4';
            }

            localStorage.setItem('wishlist', JSON.stringify(wishlist));
        });

        function updateUserInterface() {
            const user = getCurrentUser();
            const userInfo = document.getElementById('userInfo');
            const loginLink = document.getElementById('loginLink');
            const userNameSpan = document.getElementById('userName');
            
            if (user) {
                if (userInfo) userInfo.style.display = 'flex';
                if (loginLink) loginLink.style.display = 'none';
                if (userNameSpan) userNameSpan.textContent = user.name;
            } else {
                if (userInfo) userInfo.style.display = 'none';
                if (loginLink) loginLink.style.display = 'inline-block';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const dropdownToggle = document.getElementById('mainDropdownToggle');
            const dropdownMenu = document.getElementById('mainDropdownMenu');
            
            if (dropdownToggle && dropdownMenu) {
                function closeDropdown() {
                    dropdownMenu.classList.remove('show');
                }

                dropdownToggle.addEventListener('click', function(e) {
                    if (window.innerWidth <= 768) {
                        e.preventDefault();
                        e.stopPropagation();
                        dropdownMenu.classList.toggle('show');
                    }
                });

                document.addEventListener('click', function(e) {
                    if (!dropdownToggle.contains(e.target) && !dropdownMenu.contains(e.target)) {
                        closeDropdown();
                    }
                });

                window.addEventListener('resize', function() {
                    if (window.innerWidth > 768) {
                        closeDropdown();
                    }
                });
            }

            const newGames = games.filter(g => g.isNew);
            displayGames(newGames);
            document.getElementById('searchInput').addEventListener('input', filterGames);
            updateUserInterface();
        });

        document.getElementById('logoutBtn')?.addEventListener('click', function() {
            logoutUser();
            updateUserInterface();
            window.location.reload();
        });
    </script>
</body>
</html>
