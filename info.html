<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>О проекте - Kuronaxx</title>
    <style>
        :root {
            --primary: #66c0f4;
            --secondary: #4b7bac;
            --dark: #1b2838;
            --light: #c7d5e0;
            --accent: #2a475e;
            --rating: #ffc107;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        header {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-img {
            height: 45px;
            width: auto;
            vertical-align: middle;
            display: block;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .category-bar {
            background: #171a21;
            border-bottom: 1px solid #2d2f33;
            padding: 10px 0;
            width: 100%;
            position: relative;
            z-index: 1000;
        }

        .category-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        .category-item {
            color: #b8b6b4;
            text-decoration: none;
            font-size: 14px;
            padding: 5px 0;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }

        .category-item:hover {
            color: white;
            border-bottom-color: var(--primary);
        }

        .category-item.active {
            color: white;
            border-bottom-color: var(--primary);
            font-weight: 600;
        }

        .dropdown {
            position: relative;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #2a2d33;
            min-width: 250px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 1500;
            border-radius: 4px;
            margin-top: 8px;
            padding: 10px 0;
        }

        @media (min-width: 769px) {
            .dropdown:hover .dropdown-menu {
                display: block;
            }
        }

        @media (max-width: 768px) {
            .dropdown-menu {
                display: none;
                position: static;
                box-shadow: none;
                background: transparent;
                padding-left: 20px;
            }
            .dropdown-menu.show {
                display: block;
            }
        }

        .submenu-content {
            padding: 10px 15px;
            color: white;
        }

        .submenu-content a[href] {
            color: white;
            font-weight: 600;
            text-decoration: none;
            display: block;
            transition: color 0.2s;
        }

        .submenu-content a[href]:hover {
            color: var(--primary);
        }

        .container {
            padding: 30px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .info-block {
            display: flex;
            gap: 30px;
            margin-bottom: 60px;
            align-items: stretch;
        }

        .info-text {
            flex: 1;
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-text h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .info-text p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: var(--light);
        }

        .info-video {
            flex: 1;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s;
            background: var(--accent);
        }

        .info-video:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7);
        }

        .info-video video {
            width: 100%;
            height: 100%;
            min-height: 300px;
            display: block;
            object-fit: cover;
        }

        .hero-section {
            position: relative;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .hero-text {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 700px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .hero-text h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero-text p {
            font-size: 1.3rem;
            line-height: 1.6;
            color: var(--light);
        }

        .floating-game {
            position: absolute;
            width: 180px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s, filter 0.3s;
            z-index: 1;
            opacity: 0.9;
            pointer-events: none;
        }

        .floating-game:hover {
            transform: scale(1.05) rotate(0deg) !important;
            filter: brightness(1.2);
            z-index: 5;
            opacity: 1;
        }

        .back-to-catalog {
            text-align: center;
            margin: 50px 0 30px;
        }

        .back-to-catalog a {
            color: var(--primary);
            text-decoration: none;
            font-size: 1.2rem;
            padding: 12px 30px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            transition: all 0.3s;
            display: inline-block;
            background: rgba(0, 0, 0, 0.3);
        }

        .back-to-catalog a:hover {
            background: var(--primary);
            color: var(--dark);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 192, 244, 0.4);
        }

        footer {
            text-align: center;
            padding: 30px;
            margin-top: 60px;
            color: var(--text-muted, rgba(199, 213, 224, 0.6));
            border-top: 1px solid rgba(255,255,255,0.1);
        }

            margin-top: 50px;
            background: rgba(0, 0, 0,
