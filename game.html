<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали игры - Kuronaxx</title>
    <style>
        :root {
            --primary: #66c0f4;
            --secondary: #4b7bac;
            --dark: #1b2838;
            --light: #c7d5e0;
            --accent: #2a475e;
            --success: #5c7e10;
            --text-muted: rgba(199, 213, 224, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
            line-height: 1.6;
        }

        header {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-img {
            height: 45px;
            width: auto;
            vertical-align: middle;
            display: block;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .back-btn {
            color: var(--light);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: opacity 0.3s;
        }

        .back-btn:hover {
            opacity: 0.8;
        }

        .category-bar {
            background: #171a21;
            border-bottom: 1px solid #2d2f33;
            padding: 10px 0;
            width: 100%;
            position: relative;
            z-index: 1000;
        }

        .category-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            align-items: center;
        }

        .category-item {
            color: #b8b6b4;
            text-decoration: none;
            font-size: 14px;
            padding: 5px 0;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }

        .category-item:hover {
            color: white;
            border-bottom-color: var(--primary);
        }

        .category-item.active {
            color: white;
            border-bottom-color: var(--primary);
            font-weight: 600;
        }

        .dropdown {
            position: relative;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #2a2d33;
            min-width: 250px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 1500;
            border-radius: 4px;
            margin-top: 8px;
            padding: 10px 0;
        }

        @media (min-width: 769px) {
            .dropdown:hover .dropdown-menu {
                display: block;
            }
        }

        @media (max-width: 768px) {
            .dropdown-menu {
                display: none;
                position: static;
                box-shadow: none;
                background: transparent;
                padding-left: 20px;
            }
            .dropdown-menu.show {
                display: block;
            }
        }

        .submenu-content {
            padding: 10px 15px;
            color: white;
        }

        .submenu-content a[href] {
            color: white;
            font-weight: 600;
            text-decoration: none;
            display: block;
            transition: color 0.2s;
        }

        .submenu-content a[href]:hover {
            color: var(--primary);
        }

        .container {
            padding: 30px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-header {
            margin-bottom: 30px;
        }

        .game-title {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .game-subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .gallery {
            position: relative;
            margin: 40px 0;
            border-radius: 12px;
            overflow: hidden;
            height: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .gallery-main {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s;
        }

        .gallery-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }

        .gallery-btn {
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .gallery-btn:hover {
            background: rgba(0,0,0,0.8);
            transform: translateY(-50%) scale(1.1);
        }

        .game-info {
            margin: 40px 0;
        }

        .game-description {
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.8;
        }

        .play-btn {
            display: inline-block;
            padding: 15px 30px;
            background: var(--success);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(92, 126, 16, 0.3);
        }

        .play-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(92, 126, 16, 0.4);
        }

        .reviews-section {
            margin-top: 60px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 40px;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 30px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .review-form {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 0 2px var(--primary);
        }

        textarea.form-input {
            min-height: 120px;
            resize: vertical;
        }

        .submit-btn {
            padding: 12px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .submit-btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .review-list {
            margin-top: 30px;
        }

        .review-item {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            align-items: center;
        }

        .review-author {
            font-weight: 600;
            color: white;
        }

        .review-date {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .review-content {
            color: rgba(255,255,255,0.9);
        }

        footer {
            text-align: center;
            padding: 30px;
            margin-top: 60px;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 768px) {
            .gallery {
                height: 300px;
            }
            
            .game-title {
                font-size: 2rem;
            }
            
            .gallery-btn {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }

            .category-container {
                justify-content: center;
            }

            .dropdown-menu {
                position: static;
                box-shadow: none;
                background: transparent;
                padding-left: 20px;
            }

            .dropdown:hover .dropdown-menu {
                display: none;
            }

            .dropdown.active .dropdown-menu {
                display: block;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo-container">
            <img src="images/logo.png" alt="Kuronaxx" class="logo-img">
            <span class="logo-text">Kurona</span>
        </a>
        <a href="index.html" class="back-btn">← Назад к каталогу</a>
    </header>

    <div class="category-bar">
        <div class="category-container">
            <div class="dropdown">
                <a href="index.html" class="category-item" id="mainDropdownToggle">Главная</a>
                <div class="dropdown-menu" id="mainDropdownMenu">
                    <div class="submenu-content">
                        <a href="new.html">Новинки →</a>
                    </div>
                    <div class="submenu-content">
                        <a href="wishlist.html">Список желаемого →</a>
                    </div>
                </div>
            </div>
            <a href="info.html" class="category-item">Информация</a>
            <a href="support.html" class="category-item">Поддержка</a>
        </div>
    </div>

    <div class="container">
        <div class="game-header">
            <h1 class="game-title" id="gameTitle">Загрузка...</h1>
            <p class="game-subtitle" id="gameSubtitle"></p>
        </div>

        <div class="gallery">
            <img src="" alt="" class="gallery-main" id="mainImage">
            <div class="gallery-nav">
                <button class="gallery-btn" id="prevBtn">←</button>
                <button class="gallery-btn" id="nextBtn">→</button>
            </div>
        </div>

        <div class="game-info">
            <p class="game-description" id="gameDescription"></p>
            <a href="#" class="play-btn" id="playBtn">Играть</a>
        </div>

        <div class="reviews-section">
            <h2 class="section-title">Отзывы</h2>
            
            <div class="review-form">
                <div class="form-group">
                    <label for="reviewName" class="form-label">Ваше имя</label>
                    <input type="text" id="reviewName" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="reviewText" class="form-label">Ваш отзыв</label>
                    <textarea id="reviewText" class="form-input" required></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitReview">Отправить отзыв</button>
            </div>

            <div class="review-list" id="reviewList"></div>
        </div>
    </div>

    <footer>
        <p>Сделано: Белоцерковец Михаилом Дмитриевичем и Салим-Абду Рафаэлем</p>
    </footer>

    <script>
        const games = [
            {
                id: "witcher3",
                title: "The Witcher 3: Wild Hunt",
                subtitle: "Эпическая RPG в открытом мире",
                description: "The Witcher 3: Wild Hunt — это культовая ролевая игра с открытым миром, в которой вы играете за профессионального охотника на монстров Геральта из Ривии. Отправляйтесь в эпическое путешествие по огромному миру, полному интересных персонажей, опасных монстров и сложных моральных выборов. Игра получила более 800 наград 'Игра года' и задала новые стандарты для RPG.",
                images: [
                    "images/witcher3/i.webp",
                    "images/witcher3/Bg38GJ5tBJuEGqIWWHfw.jpg",
                    "images/witcher3/7777.jpg"
                ],
                officialUrl: "https://store.steampowered.com/app/292030/The_Witcher_3_Wild_Hunt/"
            },
            {
                id: "cyberpunk2077",
                title: "Cyberpunk 2077",
                subtitle: "Футуристический экшен-RPG",
                description: "Cyberpunk 2077 — это приключенческая ролевая игра, действие которой происходит в Найт-Сити, темном будущем, где технологии стали и спасением, и проклятием человечества. Играйте за V, наемника, который ищет уникальный имплантат, дарующий бессмертие. Вам предстоит сделать выбор, который изменит и город, и вашего персонажа.",
                images: [
                    "images/cyberpunk2077/7777.jpg",
                    "images/cyberpunk2077/cyberpunk_2077.jpg",
                    "images/cyberpunk2077/Cyberpunk-2077-Screenshot-072.jpg"
                ],
                officialUrl: "https://store.steampowered.com/app/1091500/Cyberpunk_2077/"
            },
            {
                id: "csgo",
                title: "Counter-Strike 2",
                subtitle: "Тактический шутер от первого лица",
                description: "Counter-Strike 2 — это переработанная версия CS:GO, работающая на движке Source 2. Игра предлагает реалистичную стрельбу, тактические командные сражения и соревновательные режимы. Сражайтесь на классических картах, улучшенных с помощью современных технологий.",
                images: [
                    "images/csgo/i 2.webp",
                    "images/csgo/i1.webp",
                    "images/csgo/i.webp"
                ],
                officialUrl: "https://store.steampowered.com/app/730/CounterStrike_2/"
            },
            {
                id: "dota2",
                title: "Dota 2",
                subtitle: "Легендарная MOBA",
                description: "Dota 2 — это многопользовательская игра в жанре MOBA, где две команды по пять игроков сражаются за контроль над картой. Каждый игрок управляет уникальным героем с особыми способностями. Глубокая стратегия, командная работа и миллионы тактических возможностей.",
                images: [
                    "images/dota2/i (1).webp",
                    "images/dota2/i2.webp",
                    "images/dota2/i3.webp"
                ],
                officialUrl: "https://store.steampowered.com/app/570/Dota_2/"
            },
            {
                id: "gta5",
                title: "Grand Theft Auto V",
                subtitle: "Криминальный экшен в открытом мире",
                description: "Grand Theft Auto V — одна из самых продаваемых игр в истории. Игроки исследуют штат Сан-Андреас, выполняют миссии и участвуют в разнообразных активностях. Режим GTA Online предлагает бесконечные возможности для многопользовательской игры.",
                images: [
                    "images/gta5/i 3.webp",
                    "images/gta5/i 1.webp",
                    "images/gta5/i.webp"
                ],
                officialUrl: "https://store.steampowered.com/app/271590/Grand_Theft_Auto_V/"
            },
            {
                id: "eldenring",
                title: "Elden Ring",
                subtitle: "Тёмное фэнтези от создателей Dark Souls",
                description: "Elden Ring — это ролевая игра с открытым миром, разработанная FromSoftware. Действие происходит в мире, созданном совместно с писателем Джорджем Мартином. Игроки исследуют Междуземье, сражаются с могущественными врагами и раскрывают тайны Кольца Элден.",
                images: [
                    "images/eldenring/Elden_Ring_game_screen.jpg",
                    "images/eldenring/7664-1743113235-1188337068.webp",
                    "images/eldenring/i 1.webp"
                ],
                officialUrl: "https://store.steampowered.com/app/1245620/Elden_Ring/"
            },
            {
                id: "fifa26",
                title: "EA SPORTS FC 26",
                subtitle: "Официальный футбольный симулятор",
                description: "EA SPORTS FC 26 продолжает традиции лучших футбольных симуляторов. Новый движок HyperMotion V, улучшенный искусственный интеллект и ещё больше лицензированных клубов. Режимы карьеры, Ultimate Team и VOLTA FOOTBALL ждут вас. Погрузитесь в атмосферу настоящего футбола!",
                images: [
                    "https://drop-assets.ea.com/images/20bYTiyLR8hjpst7WOruQi/c8d8a7ebe79bdb7dde9defb0147a11d7/FC26_Rev_Neuer_Gameplay_16x9.jpg?im=AspectCrop=(16,9),xPosition=0.5,yPosition=0.5;Resize=(1280)&q=85",
                    "https://drop-assets.ea.com/images/38KPvJkmt87CQ4QEDcdsrG/548bb708b526d0981f8eac4dd4c595fa/FC26_Rev_Musiala_Gameplay_16x9.jpg?im=AspectCrop=(16,9),xPosition=0.5,yPosition=0.5;Resize=(1280)&q=85",
                    "https://drop-assets.ea.com/images/2OiswZIkuSnHFY7fLFQezL/95ef5c5101cd4ecbbe672def1f6d9fe6/FC26_Rev_LuisHenrique_Careers_16x9.jpg?im=AspectCrop=(16,9),xPosition=0.5,yPosition=0.5;Resize=(1280)&q=85"
                ],
                officialUrl: "https://www.ea.com/games/ea-sports-fc/fc-26"
            },
            {
                id: "forzah6",
                title: "Forza Horizon 6",
                subtitle: "Гоночная аркада с открытым миром",
                description: "Forza Horizon 6 — новейшая часть популярной серии гоночных аркад. Исследуйте огромный открытый мир, наполненный захватывающими трассами, живописными пейзажами и динамическими погодными условиями. Сотни лицензированных автомобилей, глубокая система тюнинга и множество режимов игры: от уличных гонок до экстремальных состязаний. Присоединяйтесь к фестивалю Horizon и станьте легендой гонок!",
                images: [
                    "https://store-images.s-microsoft.com/image/apps.47378.13758467164481545.c998f207-34a5-4a78-8843-178e2acdf371.03eedef7-4b05-43fd-ade7-749331072d37",
                    "https://store-images.s-microsoft.com/image/apps.8335.14202278764680089.8e4c786a-0a1c-4737-a244-0bdfa34aab7b.8db5919c-3933-4150-9cb3-676123ae21e0",
                    "https://store-images.s-microsoft.com/image/apps.15199.14202278764680089.8e4c786a-0a1c-4737-a244-0bdfa34aab7b.36f3225c-6723-41d0-9828-98ad4d758c91"
                ],
                officialUrl: "https://www.xbox.com/ru-RU/games/store/forza-horizon-6/9PFDT5X4RH8B"
            }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id');

        const game = games.find(g => g.id === gameId);

        if (game) {
            document.getElementById('gameTitle').textContent = game.title;
            document.getElementById('gameSubtitle').textContent = game.subtitle;
            document.getElementById('gameDescription').textContent = game.description;
            document.getElementById('playBtn').href = game.officialUrl;

            let currentImageIndex = 0;
            const mainImage = document.getElementById('mainImage');
            mainImage.src = game.images[0];

            document.getElementById('prevBtn').addEventListener('click', () => {
                currentImageIndex = (currentImageIndex - 1 + game.images.length) % game.images.length;
                mainImage.src = game.images[currentImageIndex];
            });

            document.getElementById('nextBtn').addEventListener('click', () => {
                currentImageIndex = (currentImageIndex + 1) % game.images.length;
                mainImage.src = game.images[currentImageIndex];
            });

            const reviewList = document.getElementById('reviewList');
            const reviewName = document.getElementById('reviewName');
            const reviewText = document.getElementById('reviewText');
            const submitBtn = document.getElementById('submitReview');
            const storageKey = `reviews_${gameId}`;

            function loadReviews() {
                const reviews = JSON.parse(localStorage.getItem(storageKey) || '[]');
                reviewList.innerHTML = '';
                reviews.forEach(review => {
                    const item = document.createElement('div');
                    item.className = 'review-item';
                    item.innerHTML = `
                        <div class="review-header">
                            <span class="review-author">${escapeHtml(review.name)}</span>
                            <span class="review-date">${review.date}</span>
                        </div>
                        <div class="review-content">${escapeHtml(review.text)}</div>
                    `;
                    reviewList.appendChild(item);
                });
            }

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            submitBtn.addEventListener('click', () => {
                const name = reviewName.value.trim();
                const text = reviewText.value.trim();
                if (!name || !text) {
                    alert('Пожалуйста, заполните имя и отзыв');
                    return;
                }

                const reviews = JSON.parse(localStorage.getItem(storageKey) || '[]');
                reviews.push({
                    name: name,
                    text: text,
                    date: new Date().toLocaleDateString('ru-RU')
                });
                localStorage.setItem(storageKey, JSON.stringify(reviews));

                reviewName.value = '';
                reviewText.value = '';
                loadReviews();
            });

            loadReviews();
        } else {
            document.body.innerHTML = '<div style="text-align: center; padding: 50px;"><h1>Игра не найдена</h1><a href="index.html" style="color: var(--primary);">Вернуться к каталогу</a></div>';
        }
    </script>
</body>
</html>
